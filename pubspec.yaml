name: vanguard_crisis_response
description: A new Flutter project.
version: 1.0.0+1
environment: 
  sdk: ^3.9.0
dependencies: 
  flutter:   # 🚨 CRITICAL: Required for every Flutter project - DO NOT REMOVE
    sdk: flutter # 🚨 CRITICAL: Required for every Flutter project - DO NOT REMOVE
  flutter_localizations: 
    sdk: flutter
  flutter_svg: ^2.0.12
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  gradient_borders: ^1.0.2
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  universal_html: ^2.2.4
  # Mesh networking dependencies
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  encrypt: ^5.0.3
  http: ^1.2.2
  nearby_connections: ^4.3.0
  flutter_secure_storage: ^9.2.2
  logger: ^2.4.0
dev_dependencies: 
  flutter_test:    # 🚨 CRITICAL: Required for Flutter project testing - DO NOT REMOVE
    sdk: flutter    # 🚨 CRITICAL: Required for Flutter project testing - DO NOT REMOVE
  mockito: ^5.4.4
  build_runner: ^2.4.13
flutter: 
  uses-material-design: true # 🚨 CRITICAL: Required for Material icon font - DO NOT REMOVE
  assets: 
    - assets/
    - assets/images/
  fonts: 
    - family: Public Sans
      fonts: 
        - asset: assets/fonts/PublicSansBold.ttf
          weight: 700
        - asset: assets/fonts/PublicSansRegular.ttf
          weight: 400
        - asset: assets/fonts/PublicSansBlack.ttf
          weight: 900
        - asset: assets/fonts/PublicSansMedium.ttf
          weight: 500
        - asset: assets/fonts/PublicSansSemiBold.ttf
          weight: 600

  # 🚨 CRITICAL ASSET MANAGEMENT RULES:
  # - DO NOT ADD NEW ASSET DIRECTORIES (assets/svg/, assets/icons/, etc.)
  # - ONLY USE EXISTING AND ITEMS AVAILABLE IN THE DIRECTORIES LISTED ABOVE (assets/, assets/images/)

  # 🚨 CRITICAL FONTS RULE:
  # - DO NOT ADD NEW LOCAL FONTS TO assets/fonts/ 
  # - ONLY USE EXISTING LOCAL FONTS FROM assets/fonts/